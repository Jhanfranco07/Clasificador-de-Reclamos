services:
  - type: web
    name: smartclaim-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        value: https://clasificador-de-reclamos.vercel.app
      - key: ALLOW_VERCEL_PREVIEWS
        value: "false"
